# rippled.cfg — minimal mainnet configuration for XRPL-Hermes private node
# Generated by xrpl-hermes — edit as needed.

[server]
port_rpc_admin_local
port_ws_admin_local
port_rpc_public
port_ws_public

[port_rpc_admin_local]
port = 5005
ip = 0.0.0.0
admin = 127.0.0.1
protocol = http

[port_ws_admin_local]
port = 6006
ip = 0.0.0.0
admin = 127.0.0.1
protocol = ws

[port_rpc_public]
port = 5006
ip = 0.0.0.0
protocol = http

[port_ws_public]
port = 6007
ip = 0.0.0.0
protocol = ws

[node_size]
medium

[node_db]
type=NuDB
path=/var/lib/rippled/db/nudb
advisory_delete=0

[database_path]
/var/lib/rippled/db

[debug_logfile]
/var/log/rippled/debug.log

[sntp_servers]
time.windows.com
time.apple.com
time.nist.gov
pool.ntp.org

[ips]
r.ripple.com 51235

[validators_file]
validators.txt

[rpc_startup]
{ "command": "log_level", "severity": "warning" }

[ssl_verify]
1
