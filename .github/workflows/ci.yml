name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: python3 scripts/xrpl_tools.py --help
      - run: python3 -c "from xrpl.models.transactions import Payment; print(\"xrpl-py OK\")"
      - run: python3 scripts/xrpl_tools.py ledger || true
